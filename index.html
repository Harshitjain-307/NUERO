                                <div className="space-y-3"><label className="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-1">Service</label><select value={aptData.service} onChange={e => setAptData({...aptData, service: e.target.value})} className="w-full rounded-2xl border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 px-7 py-4.5 font-bold text-slate-900 dark:text-white border outline-none focus:border-blue-400" required><option value="">Select Option</option><option>Back Pain</option><option>Sciatica</option><option>Cervical Pain</option><option>Knee Pain</option></select></div>
                                <div className="space-y-3"><label className="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-1">Date</label><input value={aptData.date} onChange={e => setAptData({...aptData, date: e.target.value})} type="date" className="w-full rounded-2xl border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 px-7 py-4.5 font-bold text-slate-900 dark:text-white border outline-none focus:border-blue-400" required/></div>
                            </div>
                            <div className="space-y-4 pt-6 flex flex-col items-center">
                                <label className="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-2">Detailed Delhi Address</label>
                                <div className="relative w-full">
                                    <input value={aptData.location} onChange={e => setAptData({...aptData, location: e.target.value})} type="text" placeholder="House No, Landmark..." className="w-full rounded-[2.5rem] border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 px-8 sm:px-10 py-6 sm:py-7 lg:pr-40 font-bold text-slate-900 dark:text-white border outline-none focus:border-blue-400" required/>
                                    <button onClick={getLiveLocation} disabled={localLoading} type="button" className={`lg:absolute lg:right-4 lg:top-1/2 lg:-translate-y-1/2 w-full lg:w-auto mt-4 lg:mt-0 rounded-[1.5rem] px-8 py-4 text-[11px] font-black uppercase tracking-widest transition-all ${localLoading ? 'bg-slate-200 text-slate-400' : 'bg-slate-900 dark:bg-white text-white dark:text-slate-950'}`}>{localLoading ? "Fetching..." : "📍 Get Live"}</button>
                                </div>
                                {status && <p className={`mt-4 font-black uppercase tracking-widest text-[11px] ${locationSuccess ? 'text-emerald-600' : 'text-slate-400'}`}>{status}</p>}
                            </div>
                            <button type="submit" className="w-full rounded-[2.5rem] bg-emerald-600 py-6 text-base font-[900] text-white shadow-2xl hover:bg-emerald-700 transition-all uppercase tracking-widest">Send Booking Request</button>
                        </form>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer id="contact" className="bg-[#020617] pt-24 pb-16 text-slate-400 text-center lg:text-left">
                <div className="mx-auto max-w-7xl px-4 lg:px-8">
                    <div className="flex flex-col lg:grid lg:grid-cols-4 gap-20 items-center lg:items-start">
                        <div className="lg:col-span-2 flex flex-col items-center lg:items-start w-full">
                            <div className="flex items-center gap-5 justify-center lg:justify-start">
                                <div className="h-20 w-20 sm:h-24 sm:w-24 overflow-hidden rounded-2xl bg-white/5 p-1 border border-slate-800"><img src="logo.brand.png" className="h-full w-full object-contain" alt="Logo" /></div>
                                <span className="text-3xl sm:text-4xl font-[900] text-white tracking-tight">Painfree<span className="text-orange-500">.Delhi</span></span>
                            </div>
                            <p className="mt-8 text-lg font-bold leading-[1.8] max-w-md text-slate-400">Certified home-visit neurotherapy in Delhi. Activating natural healing for structural recovery without medicines.</p>
                            <a href={`https://wa.me/${WHATSAPP_NUMBER}`} target="_blank" className="inline-flex items-center gap-3 mt-10 px-8 py-5 rounded-[2rem] bg-emerald-600/10 border border-emerald-600/20 hover:bg-emerald-600/20 transition-all group lg:mx-0 mx-auto w-max"><span className="text-sm font-black text-emerald-500 uppercase tracking-widest">Chat on WhatsApp</span></a>
                        </div>
                        <div className="grid grid-cols-2 lg:col-span-2 gap-12 w-full">
                            <div className="space-y-8"><h4 className="font-black text-white uppercase tracking-widest text-[11px]">Links</h4><ul className="space-y-5 text-[12px] font-black uppercase tracking-widest text-slate-500"><li><a href="#home" className="hover:text-white transition-colors">Home Page</a></li><li><a href="#about" className="hover:text-white transition-colors">Approach</a></li><li><a href="#reviews" className="hover:text-white transition-colors">Success</a></li></ul></div>
                            <div className="space-y-8"><h4 className="font-black text-white uppercase tracking-widest text-[11px]">Contact</h4><ul className="space-y-5 text-[12px] font-black uppercase tracking-widest text-slate-500"><li><a href="tel:+918077978440" className="text-white">+91 8077978440</a></li><li><a href="#appointment" className="text-orange-500">Book Visit</a></li><li><span className="lowercase">New Delhi, India</span></li></ul></div>
                        </div>
                    </div>

                    {/* Developer Credit Section */}
                    <div className="mt-24 pt-10 border-t border-slate-800/60 flex flex-col items-center">
                        <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2">Website developed by</span>
                        <span className="text-xl font-[900] text-white tracking-tight mb-6">Harshit Jain</span>
                        <a 
                            href="https://www.instagram.com/harshit_jain_30/" 
                            target="_blank" 
                            rel="noreferrer" 
                            className="group relative h-12 w-12 rounded-[1.25rem] bg-gradient-to-tr from-orange-500 via-pink-500 to-purple-500 flex items-center justify-center text-white shadow-xl hover:scale-110 active:scale-95 transition-all outline-none"
                            title="Visit Instagram"
                        >
                            <svg className="w-6 h-6 fill-current" viewBox="0 0 24 24">
                                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.337 3.608 1.31.972.975 1.248 2.242 1.31 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.337 2.633-1.31 3.608-.975.972-2.242 1.248-3.608 1.31-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.337-3.608-1.31-.972-.975-1.248-2.242-1.31-3.608-.058-1.266-.07-1.646-.07-4.85s.012-3.584.07-4.85c.062-1.366.337-2.633 1.31-3.608.975-.972 2.242-1.248 3.608-1.31 1.266-.058 1.646-.07 4.85-.07zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.058 1.281-.072 1.688-.072 4.948s.014 3.667.072 4.947c.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.688.072 4.948.072s3.667-.014 4.947-.072c4.358-.2 6.78-2.618 6.98-6.98.058-1.281.072-1.688.072-4.948s-.014-3.667-.072-4.947c-.2-4.358-2.618-6.78-6.98-6.98-1.281-.058-1.647-.072-4.947-.072zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.791-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.209-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = React.useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = React.useState(false);
            const [darkMode, setDarkMode] = React.useState(false);
            const [videoSrc, setVideoSrc] = React.useState(null);
            const [reviews, setReviews] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [formData, setFormData] = React.useState({ name: '', condition: '', review_text: '' });
            const [lastReviewDate, setLastReviewDate] = React.useState(null);
            const navItems = ["Home", "About", "Services", "Reviews", "Contact"];
            const services = [
                { title: 'Back Pain', desc: 'Natural structural alignment.', img: 'nuero.backpain.jpeg' },
                { title: 'Gastro', desc: 'Safe, non-surgical therapy.', img: 'nuero.gastro.jpeg' },
                { title: 'Sciatica', desc: 'Nerve compression relief.', img: 'nuero.sciatica.jpeg' },
                { title: 'Cervical', desc: 'Precision neck recovery.', img: 'nuero.cervical.jpeg' },
                { title: 'Knee Pain', desc: 'Complete joint mobility.', img: 'nuero.kneepain.jpeg' },
                { title: 'Migraine', desc: 'Chemical balance therapy.', img: 'nuero.migrane.jpeg' }
            ];
            const fetchReviews = async () => {
                if(supabase){ const {data}=await supabase.from('reviews').select('*').order('created_at',{ascending:false}); if(data){ setReviews(data); if(data[0]) setLastReviewDate(new Date(data[0].created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})); } }
                else { setReviews(JSON.parse(localStorage.getItem('painfree_reviews')) || []); }
            };
            const submitReview = async () => {
                setLoading(true); if(supabase){ await supabase.from('reviews').insert([formData]); } else { const l=JSON.parse(localStorage.getItem('painfree_reviews'))||[]; localStorage.setItem('painfree_reviews',JSON.stringify([{...formData,created_at:new Date().toISOString()},...l])); }
                setFormData({name:'',condition:'',review_text:''}); fetchReviews(); setLoading(false);
            };
            React.useEffect(()=>{ fetchReviews(); setDarkMode(localStorage.getItem('painfree_dark')==='true'); },[]);
            React.useEffect(()=>{ document.documentElement.className=darkMode?'dark':''; localStorage.setItem('painfree_dark',darkMode); },[darkMode]);

            return (
                <div className="min-h-screen text-slate-700 dark:text-slate-300">
                    <div className="fixed inset-0 z-[-1] pointer-events-none">{videoSrc ? <video key={videoSrc} autoPlay loop muted className="h-full w-full object-cover opacity-60 dark:opacity-30"><source src={videoSrc} type="video/mp4" /></video> : <div className="mesh-gradient"></div>}<div className={`absolute inset-0 ${darkMode ? 'bg-slate-950/50' : 'bg-white/10'}`}></div></div>
                    {isSettingsOpen && <div className="fixed inset-y-0 right-0 z-[200] w-full sm:w-[400px] settings-panel p-10 sm:p-14 transition-all overflow-y-auto"><div className="flex items-center justify-between mb-16"><h3 className="text-2xl font-[900] text-slate-900 dark:text-white">Display Config</h3><button onClick={()=>setIsSettingsOpen(false)} className="h-12 w-12 flex items-center justify-center rounded-2xl bg-white dark:bg-slate-800 text-slate-700 dark:text-white shadow-sm border border-slate-100 dark:border-slate-700">✕</button></div><div className="space-y-12"><button onClick={()=>setDarkMode(!darkMode)} className="w-full flex items-center justify-between p-7 rounded-[2.5rem] bg-slate-100/50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700 flex items-center justify-between"><span className="font-bold">{darkMode ? 'Deep Mode' : 'Glow Mode'}</span><div className={`h-7 w-12 rounded-full relative ${darkMode ? 'bg-blue-600' : 'bg-slate-300'}`}><div className={`absolute top-1.5 h-4 w-4 bg-white rounded-full transition-all ${darkMode ? 'left-6.5' : 'left-1.5'}`}></div></div></button><div className="relative overflow-hidden p-12 rounded-[3.5rem] border-2 border-dashed border-slate-300 dark:border-slate-800 flex flex-col items-center gap-4 bg-slate-50/50 dark:bg-slate-900/30 group"><input type="file" accept="video/*" onChange={e=>{const f=e.target.files[0]; if(f&&f.type.startsWith('video/')){setVideoSrc(URL.createObjectURL(f))}}} className="absolute inset-0 opacity-0 cursor-pointer"/><span className="text-4xl">📹</span><span className="text-[10px] font-black uppercase tracking-widest text-slate-500">Video Background</span></div><button onClick={()=>setIsSettingsOpen(false)} className="w-full py-6 rounded-[2.5rem] bg-slate-900 dark:bg-white text-white dark:text-slate-950 font-black text-xs uppercase tracking-[0.2em]">Close & Save</button></div></div>}
                    <Navbar navItems={navItems} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} />
                    <main>
                        <Hero /><About />
                        <section id="services" className="py-20 lg:py-40 relative"><div className="mx-auto max-w-7xl px-4 lg:px-8"><div className="text-center mb-16"><span className="font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest text-[11px]">Specialized Care</span><h2 className="mt-8 text-4xl lg:text-5xl font-[900] text-slate-900 dark:text-slate-100 tracking-tight">Home-Based clinical Excellence</h2></div><div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 sm:gap-10">{services.map((s,i)=>(<div key={i} className="card-bg rounded-[2.5rem] overflow-hidden card-hover group shadow-xl flex flex-col"><div className="h-64 sm:h-72 overflow-hidden relative"><img src={s.img} alt={s.title} className="h-full w-full object-cover group-hover:scale-105 transition-transform duration-700" onError={e=>e.target.src='https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&w=800'}/><div className="absolute inset-0 bg-gradient-to-t from-slate-900/40 to-transparent"></div></div><div className="p-10 flex-grow text-center"><h3 className="font-[900] text-slate-900 dark:text-white text-2xl mb-4 tracking-tight">{s.title}</h3><p className="text-sm font-bold text-slate-600 dark:text-slate-500 leading-relaxed uppercase tracking-wider">{s.desc}</p></div></div>))}</div></div></section>
                        <section id="case-studies" className="py-20 lg:py-48 bg-slate-950 text-white"><div className="mx-auto max-w-7xl px-4 lg:px-8 grid gap-16 lg:grid-cols-2 lg:items-center"><div><span className="font-black text-orange-500 uppercase tracking-widest text-[11px]">Clinical Excellence</span><h2 className="mt-10 text-4xl sm:text-6xl lg:text-7xl font-[900] leading-tight tracking-tight">The <br /><span className="text-blue-400 font-medium italic">Healing Collective</span></h2><p className="mt-10 text-lg sm:text-xl font-bold text-slate-400 leading-relaxed">Certified Neurotherapists, Committed to Results — <br className="hidden sm:block" /> No Medicines. No Machines.</p></div><div className="aspect-square rounded-[3.5rem] overflow-hidden shadow-3xl bg-white/5 p-4 border border-white/10"><img src="nuero.about.jpeg" className="h-full w-full object-cover rounded-[3rem]" alt="Success Story" /></div></div></section>
                        <Reviews reviews={reviews} loading={loading} onSubmitReview={submitReview} formData={formData} setFormData={setFormData} lastReviewDate={lastReviewDate} />
                        <Appointment />
                    </main>
                    <Footer />
                    <button onClick={() => setIsSettingsOpen(true)} className="fixed bottom-10 right-8 z-[150] h-16 w-16 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl flex items-center justify-center border border-slate-100 dark:border-slate-700 active:scale-90 transition-all shadow-xl"><span className="text-3xl">⚙️</span></button>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
